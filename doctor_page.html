<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swift Screen - Doctor View</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Orbitron:wght@400;500;600;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8fbff;color:#1e293b;font-family:'Noto Sans KR',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(135,206,235,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(135,206,235,.06) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:20px 24px}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 20px;border-bottom:2px solid #e0f2fe}
.header-left{display:flex;align-items:center;gap:14px}
.back-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;background:#f0f9ff;border:1px solid #bae6fd;color:#0ea5e9;font-size:18px;text-decoration:none;transition:.2s}
.back-btn:hover{background:#0ea5e9;color:#fff}
.page-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;background:linear-gradient(135deg,#0ea5e9,#0284c7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.subtitle{font-size:12px;color:#64748b;margin-top:2px}
.clock{font-family:'Outfit',sans-serif;font-size:28px;font-weight:700;color:#97c4de}
.doctor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-top:24px}
.doctor-card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:20px;box-shadow:0 8px 20px rgba(0,0,0,.02)}
.doctor-name{font-size:16px;font-weight:800;color:#0ea5e9;margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:2px solid #f0f9ff}
.doctor-name::before{content:'👨‍⚕️';font-size:20px}
.patient-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f8fafc;border:1px solid #f1f5f9;border-radius:10px;margin-bottom:8px}
.patient-item .num{font-family:'Orbitron',monospace;font-size:10px;color:#94a3b8;background:#f1f5f9;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.patient-item .name{font-size:14px;font-weight:700;color:#1e293b;flex:1}
.patient-item .type-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.patient-item .type-tag.res{background:#e0f2fe;color:#0284c7}
.patient-item .type-tag.walk{background:#fef3c7;color:#d97706}
.empty-doc{color:#94a3b8;font-size:13px;text-align:center;padding:16px}
.unassigned-section{margin-top:24px;background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:20px}
.unassigned-title{font-size:14px;font-weight:700;color:#94a3b8;margin-bottom:12px;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<div class="container">
<header class="header">
<div class="header-left">
<div><div class="page-title">DOCTOR VIEW</div><div class="subtitle">Waiting patients by doctor</div></div>
</div>
<div class="clock" id="clock">00:00</div>
</header>
<div class="doctor-grid" id="doctorGrid"></div>
<div class="unassigned-section" id="unassignedSection" style="display:none">
<div class="unassigned-title">⚠️ Unassigned Patients</div>
<div id="unassignedItems"></div>
</div>
</div>
<script>
const API = "https://swift-medical-api.naranja.my";
let lastVer = -1;

function updateClock(){const n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')}
updateClock();setInterval(updateClock,30000);

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function formatName(f,l){if(!f||!l)return'—';return f.charAt(0).toUpperCase()+f.slice(1)+' '+l.charAt(0).toUpperCase()+'.'}

async function fetchData(){
    try{
        const r=await fetch(`${API}/screen-data`);
        if(!r.ok)return;
        const d=await r.json();
        if(d.version!==lastVer){lastVer=d.version;render(d)}
    }catch(e){console.error(e)}
}

function render(data){
    const waiting=[...(data.internal_waitlist||[]),...(data.waiting_reservation||[]),...(data.waiting_walkin||[]),...(data.screen_list||[])];
    const doctors=data.doctors||[];
    const grid=document.getElementById('doctorGrid');
    grid.innerHTML='';

    const byDoctor={};
    const unassigned=[];
    doctors.forEach(d=>{byDoctor[d]=[]});
    waiting.forEach(p=>{
        if(p.doctor && byDoctor[p.doctor]!==undefined) byDoctor[p.doctor].push(p);
        else unassigned.push(p);
    });

    doctors.forEach(doc=>{
        const patients=byDoctor[doc];
        const card=document.createElement('div');
        card.className='doctor-card';
        let html=`<div class="doctor-name">${esc(doc)} <span style="font-size:12px;font-weight:500;color:#94a3b8">(${patients.length})</span></div>`;
        if(!patients.length){html+='<div class="empty-doc">No patients assigned</div>';}
        else{patients.forEach((p,i)=>{
            const tag=p.type==='reservation'?'<span class="type-tag res">R</span>':'<span class="type-tag walk">W</span>';
            html+=`<div class="patient-item"><span class="num">${i+1}</span><span class="name">${formatName(p.firstName,p.lastName)}</span>${tag}</div>`;
        })}
        card.innerHTML=html;
        grid.appendChild(card);
    });

    const uSec=document.getElementById('unassignedSection');
    const uItems=document.getElementById('unassignedItems');
    if(unassigned.length){
        uSec.style.display='block';
        uItems.innerHTML='';
        unassigned.forEach((p,i)=>{
            const tag=p.type==='reservation'?'<span class="type-tag res">R</span>':'<span class="type-tag walk">W</span>';
            uItems.innerHTML+=`<div class="patient-item"><span class="num">${i+1}</span><span class="name">${formatName(p.firstName,p.lastName)}</span>${tag}</div>`;
        });
    }else{uSec.style.display='none'}
}

fetchData();
setInterval(fetchData,3000);
</script>
</body>
</html>
