<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swift Screen - 전광판</title>
    <meta name="description" content="Swift Screen 실시간 전광판 디스플레이">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Orbitron:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e1a;
            color: #e0e6f0;
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0, 198, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 198, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle animated glow */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 123, 255, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(0, 198, 255, 0.04) 0%, transparent 50%);
            animation: ambientGlow 15s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes ambientGlow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, 5%); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px 30px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0 20px;
            border-bottom: 1px solid rgba(0, 198, 255, 0.15);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            box-shadow: 0 4px 20px rgba(0, 123, 255, 0.3);
        }

        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .clock {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 600;
            color: #00c6ff;
            text-shadow: 0 0 20px rgba(0, 198, 255, 0.3);
            letter-spacing: 3px;
        }

        .date-display {
            font-size: 14px;
            color: rgba(224, 230, 240, 0.5);
            font-weight: 300;
        }

        /* Board area */
        .board-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            overflow: hidden;
        }

        /* Table header */
        .table-header {
            display: grid;
            grid-template-columns: 80px 1fr 1.2fr 1.5fr;
            gap: 2px;
            padding: 0 4px;
            margin-bottom: 8px;
        }

        .table-header .th {
            background: linear-gradient(135deg, rgba(0, 123, 255, 0.25), rgba(0, 198, 255, 0.15));
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 700;
            color: #00c6ff;
            text-align: center;
            letter-spacing: 2px;
            border: 1px solid rgba(0, 198, 255, 0.2);
            text-shadow: 0 0 10px rgba(0, 198, 255, 0.3);
        }

        .table-header .th:first-child {
            border-radius: 12px 0 0 12px;
        }

        .table-header .th:last-child {
            border-radius: 0 12px 12px 0;
        }

        /* Table body */
        .table-body {
            flex: 1;
            overflow-y: auto;
            padding: 0 4px;
            scrollbar-width: none;
        }

        .table-body::-webkit-scrollbar {
            display: none;
        }

        .table-row {
            display: grid;
            grid-template-columns: 80px 1fr 1.2fr 1.5fr;
            gap: 2px;
            margin-bottom: 4px;
            animation: rowAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes rowAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .table-row .td {
            background: rgba(15, 22, 40, 0.7);
            padding: 18px 20px;
            font-size: 22px;
            font-weight: 500;
            text-align: center;
            border: 1px solid rgba(0, 198, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .table-row:hover .td {
            background: rgba(0, 123, 255, 0.08);
            border-color: rgba(0, 198, 255, 0.15);
        }

        .table-row .td:first-child {
            border-radius: 10px 0 0 10px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: rgba(0, 198, 255, 0.6);
            font-size: 16px;
        }

        .table-row .td:last-child {
            border-radius: 0 10px 10px 0;
        }

        .td .name {
            font-weight: 700;
            font-size: 26px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .td .room-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .room-badge.room1 {
            background: rgba(0, 198, 255, 0.12);
            color: #00c6ff;
            border: 1px solid rgba(0, 198, 255, 0.25);
        }

        .room-badge.room2 {
            background: rgba(139, 92, 246, 0.12);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.25);
        }

        .room-badge.vital {
            background: rgba(16, 185, 129, 0.12);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .room-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .room1 .dot { background: #00c6ff; }
        .room2 .dot { background: #a78bfa; }
        .vital .dot { background: #34d399; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .td .note-text {
            color: rgba(224, 230, 240, 0.6);
            font-size: 16px;
            font-weight: 400;
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            opacity: 0.4;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            border: 2px dashed rgba(0, 198, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            animation: emptyPulse 3s ease-in-out infinite;
        }

        @keyframes emptyPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .empty-text {
            font-size: 18px;
            font-weight: 300;
            color: rgba(224, 230, 240, 0.4);
            letter-spacing: 4px;
        }

        /* Footer */
        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 0 8px;
            border-top: 1px solid rgba(0, 198, 255, 0.08);
        }

        .manage-btn {
            background: rgba(0, 123, 255, 0.08);
            border: 1px solid rgba(0, 198, 255, 0.15);
            color: rgba(0, 198, 255, 0.5);
            padding: 8px 24px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 1px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .manage-btn:hover {
            background: rgba(0, 123, 255, 0.15);
            color: #00c6ff;
            border-color: rgba(0, 198, 255, 0.35);
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.15);
        }

        /* New row flash animation */
        .table-row.new-row .td {
            animation: flashNew 1.5s ease-out;
        }

        @keyframes flashNew {
            0% { background: rgba(0, 198, 255, 0.2); }
            100% { background: rgba(15, 22, 40, 0.7); }
        }

        /* Delete animation */
        .table-row.removing {
            animation: rowRemove 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes rowRemove {
            to {
                opacity: 0;
                transform: translateX(50px);
                max-height: 0;
                margin: 0;
                padding: 0;
            }
        }

        /* Status bar */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: rgba(224, 230, 240, 0.25);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header" id="header">
            <div class="logo-area">
                <div class="logo-icon">S</div>
                <div class="logo-text">SWIFT SCREEN</div>
            </div>
            <div class="header-right">
                <div>
                    <div class="clock" id="clock">00:00:00</div>
                    <div class="date-display" id="dateDisplay"></div>
                </div>
            </div>
        </header>

        <!-- Board -->
        <div class="board-wrapper">
            <div class="table-header">
                <div class="th">번호</div>
                <div class="th">이름</div>
                <div class="th">장소</div>
                <div class="th">비고</div>
            </div>
            <div class="table-body" id="tableBody">
                <!-- Rows will be dynamically inserted -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <div class="status-bar">
                <div class="status-dot"></div>
                <span>실시간 연결됨</span>
            </div>
            <div style="flex:1"></div>
            <a href="manage.html" class="manage-btn" id="manageBtn">관리하기</a>
        </footer>
    </div>

    <script>
        // Clock
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;

            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const day = days[now.getDay()];
            document.getElementById('dateDisplay').textContent = `${year}년 ${month}월 ${date}일 (${day})`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // Room badge class mapping
        function getRoomClass(room) {
            if (room === '대기실1') return 'room1';
            if (room === '대기실2') return 'room2';
            if (room === 'Vital 측정실') return 'vital';
            return 'room1';
        }

        // Room display name with icon
        function getRoomIcon(room) {
            if (room === '대기실1') return '🏥';
            if (room === '대기실2') return '🏥';
            if (room === 'Vital 측정실') return '💉';
            return '📍';
        }

        // Render board
        function renderBoard(isNew) {
            const tableBody = document.getElementById('tableBody');
            const data = JSON.parse(localStorage.getItem('swiftScreenData') || '[]');

            if (data.length === 0) {
                tableBody.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div class="empty-text">대기 목록이 비어있습니다</div>
                    </div>
                `;
                return;
            }

            tableBody.innerHTML = '';
            data.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'table-row' + (isNew ? ' new-row' : '');
                row.style.animationDelay = `${index * 0.05}s`;

                const roomClass = getRoomClass(item.room);
                
                row.innerHTML = `
                    <div class="td">${String(index + 1).padStart(2, '0')}</div>
                    <div class="td"><span class="name">${escapeHtml(item.name)}</span></div>
                    <div class="td">
                        <span class="room-badge ${roomClass}">
                            <span class="dot"></span>
                            ${escapeHtml(item.room)}
                        </span>
                    </div>
                    <div class="td"><span class="note-text">${item.note ? escapeHtml(item.note) : '—'}</span></div>
                `;
                tableBody.appendChild(row);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initial render
        renderBoard(false);

        // Listen for real-time updates from manage.html
        window.addEventListener('storage', function(e) {
            if (e.key === 'swiftScreenData') {
                renderBoard(true);
            }
        });
    </script>
</body>
</html>
