<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swift Screen - Dashboard</title>
    <meta name="description" content="Swift Screen Real-time Dashboard">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Orbitron:wght@400;500;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #1e293b;
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Very subtle background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(14, 165, 233, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 95%;
            padding: 30px;
            align-items: center;
        }

        .main-content {
            display: flex;
            width: 100%;
            flex: 1;
            gap: 30px;
            margin-top: 10px;
            overflow: hidden;
        }

        /* Top Header Container */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo-img {
            width: 250px;
            max-width: 50%;
            height: auto;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        /* Main Display Card - Sky Blue Gradient */
        .display-card {
            flex: 4;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(145deg, #f0f9ff 0%, #bae6fd 100%);
            border-radius: 40px;
            border: 1px solid #bae6fd;
            box-shadow: 0 40px 80px rgba(14, 165, 233, 0.12);
            padding: 40px;
            position: relative;
            animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .status-badge {
            position: absolute;
            top: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 20px;
            font-weight: 700;
            color: #0369a1;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }
        }

        /* Patient Info Styling */
        h1 {
            font-size: clamp(50px, 12vw, 110px);
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            line-height: 1.1;
        }

        h3 {
            font-size: clamp(24px, 4vw, 40px);
            color: #475569;
            font-weight: 500;
            margin-bottom: 25px;
        }

        h2 {
            font-size: clamp(28px, 5vw, 64px);
            font-weight: 900;
            color: #ffffff;
            background: #0ea5e9;
            padding: 12px 40px;
            border-radius: 80px;
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.2);
            display: inline-block;
            letter-spacing: 1px;
        }

        @media screen and (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .display-card {
                padding: 30px 20px;
                border-radius: 24px;
            }

            .status-badge {
                top: 20px;
                right: 20px;
                font-size: 12px;
                padding: 6px 12px;
            }

            .logo-img {
                width: 200px;
            }

            h2 {
                padding: 12px 30px;
            }

            .clock-time {
                font-size: 24px;
            }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
        }

        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 24px;
            color: #94a3b8;
            letter-spacing: 2px;
        }

        /* Header Clock */
        .header-clock {
            text-align: right;
        }

        .clock-time {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: 700;
            color: #0369a1;
            letter-spacing: 2px;
        }

        .clock-date {
            font-size: 16px;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* Waiting List */
        .waiting-list-container {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .waiting-title {
            font-size: 18px;
            font-weight: 700;
            color: #0ea5e9;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #e0f2fe;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .waiting-list {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            gap: 15px;
            padding-bottom: 10px;
            padding-right: 5px;
        }

        .waiting-list::-webkit-scrollbar {
            width: 6px;
        }

        .waiting-list::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        .waiting-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .waiting-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 15px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: cardAppear 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .waiting-card-name {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
        }

        .waiting-card-room {
            font-size: 13px;
            font-weight: 700;
            color: #0ea5e9;
            background: #f0f9ff;
            padding: 4px 10px;
            border-radius: 10px;
            align-self: flex-start;
        }

        .waiting-card-note {
            font-size: 13px;
            color: #64748b;
        }

        /* Bottom Control Button */
        .manage-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s;
        }

        .manage-link:hover {
            color: #0ea5e9;
            border-color: #0ea5e9;
            background: #f0f9ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Top Header: Logo + Clock -->
        <header class="header">
            <img src="logo-wide.png" alt="Swift Logo" class="logo-img">
            <div class="header-clock">
                <div class="clock-time" id="clock">00:00:00</div>
                <div class="clock-date" id="dateDisplay"></div>
            </div>
        </header>

        <div class="main-content">
            <!-- Main Display Card (Now Calling) -->
            <div class="display-card" id="mainDisplay">
                <!-- Content will be injected by JS -->
            </div>

            <!-- Waiting List -->
            <div class="waiting-list-container">
                <div class="waiting-title">Waiting List</div>
                <div class="waiting-list" id="waitingList">
                    <!-- Content will be injected by JS -->
                </div>
            </div>
        </div>
    </div>

    <a href="manage.html" class="manage-link">Manage</a>

    <div id="soundOverlay"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: white;">
        <div style="font-size: 60px; margin-bottom: 20px;">🔔</div>
        <div style="font-size: 24px; font-weight: 700;">Click to Enable Sound Alerts</div>
        <div style="font-size: 14px; margin-top: 10px; opacity: 0.8;">Required for browser audio playback</div>
    </div>

    <script>
        let lastTimestamp = null;
        let lastVersion = -1;
        let audioCtx = null;
        let eventSource = null;

        // Sound activation
        document.getElementById('soundOverlay').addEventListener('click', function () {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            this.style.display = 'none';
            const buffer = audioCtx.createBuffer(1, 1, 22050);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start(0);
            playDing();
        });

        function playDing() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const now = audioCtx.currentTime;
            function playNote(freq, startTime, duration) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + duration);
            }
            playNote(783.99, now, 0.8);
            playNote(1046.50, now + 0.15, 1.0);
        }

        // Clock
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const month = months[now.getMonth()];
            const date = now.getDate();
            const year = now.getFullYear();
            const day = days[now.getDay()];
            document.getElementById('dateDisplay').textContent = `${month} ${date}, ${year} (${day})`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // Name Formatting & Masking Logic: James Lee -> James L**
        function formatAndMaskName(first, last) {
            if (!first || !last) return '—';
            const f = first.charAt(0).toUpperCase() + first.slice(1);
            const l = last.charAt(0).toUpperCase() + last.slice(1);
            const maskedLast = l.charAt(0) + '*'.repeat(Math.max(0, l.length - 1));
            return `${f} ${maskedLast}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Render screen from data (called only when data changes)
        function renderScreenData(data) {
            const display = document.getElementById('mainDisplay');
            const waitingListContainer = document.getElementById('waitingList');
            const queue = data.queue;
            const defaultMessage = data.default_message || "Welcome to Swift Medical Clinic";

            if (!queue || queue.length === 0) {
                display.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🏥</div>
                        <div class="empty-text" style="font-weight:700; color:#0ea5e9; text-align:center; max-width:80%; font-size:clamp(24px, 5vw, 48px); line-height:1.4;">${escapeHtml(defaultMessage)}</div>
                    </div>
                `;
                waitingListContainer.innerHTML = '<div style="color:#94a3b8; font-size: 16px; padding: 20px 0;">Queue is empty</div>';
                lastTimestamp = null;
                return;
            }

            const latest = queue[0];

            // Check for new patient to play ding
            if (latest.timestamp && latest.timestamp !== lastTimestamp) {
                playDing();
                lastTimestamp = latest.timestamp;
            }

            display.innerHTML = `
                <div class="status-badge">
                    <div class="status-dot"></div>
                    Now Calling
                </div>
                <h1>${formatAndMaskName(latest.firstName, latest.lastName)}</h1>
                <h3>${latest.note ? escapeHtml(latest.note) : '—'}</h3>
                <h2>${escapeHtml(latest.room)}</h2>
            `;

            // Render waiting list
            waitingListContainer.innerHTML = '';
            if (queue.length > 1) {
                for (let i = 1; i < queue.length; i++) {
                    const item = queue[i];
                    const card = document.createElement('div');
                    card.className = 'waiting-card';
                    card.innerHTML = `
                        <div class="waiting-card-name">${formatAndMaskName(item.firstName, item.lastName)}</div>
                        <div class="waiting-card-room">${escapeHtml(item.room)}</div>
                        ${item.note ? `<div class="waiting-card-note">${escapeHtml(item.note)}</div>` : ''}
                    `;
                    waitingListContainer.appendChild(card);
                }
            } else {
                waitingListContainer.innerHTML = '<div style="color:#94a3b8; font-size: 16px; padding: 20px 0;">No other patients waiting</div>';
            }
        }

        // ── SSE (Server-Sent Events) ──
        // Connect once, receive updates only when data changes.
        // No more polling = no flickering!
        function connectSSE() {
            const apiBase = "https://swift-medical-api.naranja.my";

            if (eventSource) {
                eventSource.close();
            }

            console.log("[SSE] Connecting...");
            eventSource = new EventSource(`${apiBase}/screen-events`);

            eventSource.onmessage = function (event) {
                try {
                    const data = JSON.parse(event.data);
                    // Only re-render if the version actually changed
                    if (data.version !== lastVersion) {
                        console.log(`[SSE] New version ${data.version}, rendering...`);
                        lastVersion = data.version;
                        renderScreenData(data);
                    }
                } catch (err) {
                    console.error("[SSE] Parse error:", err);
                }
            };

            eventSource.onerror = function () {
                console.warn("[SSE] Connection lost, reconnecting in 3s...");
                eventSource.close();
                setTimeout(connectSSE, 3000);
            };

            eventSource.onopen = function () {
                console.log("[SSE] Connected ✓");
            };
        }

        // Fallback: initial fetch in case SSE takes a moment to connect
        async function initialFetch() {
            const apiBase = "https://swift-medical-api.naranja.my";
            try {
                const response = await fetch(`${apiBase}/screen-data`);
                if (response.ok) {
                    const data = await response.json();
                    lastVersion = data.version;
                    renderScreenData(data);
                }
            } catch (err) {
                console.error("Initial fetch failed:", err);
            }
        }

        // Boot up: fetch once, then switch to SSE for live updates
        initialFetch();
        connectSSE();
    </script>
</body>

</html>
