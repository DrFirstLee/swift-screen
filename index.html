<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SwiftDash">
    <link rel="apple-touch-icon" href="dashboard-icon.png">
    <meta name="theme-color" content="#ffffff">
    <title>Swift Screen - Dashboard</title>
    <meta name="description" content="Swift Screen Real-time Dashboard">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Orbitron:wght@400;500;600;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #1e293b;
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(14, 165, 233, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 98%;
            padding: 20px 30px;
            align-items: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex-shrink: 0;
        }

        .logo-img {
            width: 220px;
            max-width: 40%;
            height: auto;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .header-clock {
            text-align: right;
        }

        .clock-time {
            font-family: 'Outfit', sans-serif;
            font-size: 34px;
            font-weight: 700;
            color: #97c4de;
            letter-spacing: -1px;
        }

        .clock-date {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* Main Content Layout: 3/4 + 1/4 */
        .main-content {
            display: flex;
            width: 100%;
            flex: 1;
            gap: 20px;
            margin-top: 15px;
            overflow: hidden;
        }

        /* ── Main Screen ── */
        .main-screen {
            flex: 2.2; /* 기존 3에서 2.2로 줄여 사이드바 공간 확보 */
            display: grid;
            gap: 16px;
            height: 100%;
            overflow: hidden;
        }

        /* Dynamic grid: 1 = full, 2 = 1x2, 3 = 2x2 (one empty), 4 = 2x2 */
        .main-screen.grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .main-screen.grid-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
        .main-screen.grid-3,
        .main-screen.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .call-card {
            background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 28px;
            border: 1px solid #bae6fd;
            box-shadow: 0 20px 50px rgba(14, 165, 233, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px 24px;
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .call-card .status-badge {
            position: absolute;
            top: 18px;
            right: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(6px);
            border: 1px solid #bae6fd;
            border-radius: 14px;
            font-weight: 700;
            color: #0369a1;
            font-size: 11px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        .call-card .patient-name {
            font-size: clamp(36px, 8vw, 80px);
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 10px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        /* Smaller text when grid has 2+ cards */
        .main-screen.grid-2 .patient-name,
        .main-screen.grid-3 .patient-name,
        .main-screen.grid-4 .patient-name {
            font-size: clamp(28px, 5vw, 56px);
        }

        .call-card .patient-note {
            font-size: clamp(16px, 3vw, 28px);
            color: #475569;
            font-weight: 500;
            margin-bottom: 14px;
        }

        .main-screen.grid-2 .patient-note,
        .main-screen.grid-3 .patient-note,
        .main-screen.grid-4 .patient-note {
            font-size: clamp(14px, 2vw, 20px);
        }

        .call-card .patient-room {
            font-size: clamp(18px, 3vw, 36px);
            font-weight: 900;
            color: #ffffff;
            padding: 8px 28px;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            display: inline-block;
        }

        .main-screen.grid-2 .patient-room,
        .main-screen.grid-3 .patient-room,
        .main-screen.grid-4 .patient-room {
            font-size: clamp(14px, 2vw, 24px);
            padding: 6px 20px;
        }

        /* Empty state for main screen */
        .empty-state {
            grid-column: 1 / -1;
            grid-row: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 28px;
            border: 1px solid #bae6fd;
        }

        .empty-icon { font-size: 60px; margin-bottom: 16px; }

        .empty-text {
            font-weight: 700;
            color: #0ea5e9;
            text-align: center;
            max-width: 80%;
            font-size: clamp(22px, 4vw, 42px);
            line-height: 1.4;
        }

        /* ── Sidebar Waiting List (1/4) ── */
        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: row; /* 좌우 배치로 변경 */
            gap: 12px;
            height: 100%;
            overflow: hidden;
        }

        .sidebar-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 14px;
        }

        .sidebar-title {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f5f9;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-title.reservation { color: #0ea5e9; }
        .sidebar-title.walkin { color: #f59e0b; }

        .sidebar-title .count {
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-track { background: transparent; }
        .sidebar-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

        .wait-item {
            padding: 10px 14px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
            animation: cardAppear 0.4s ease-out;
        }

        .wait-item-name {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
        }

        .wait-item-type {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 4px;
        }

        .wait-item-type.res {
            background: #e0f2fe;
            color: #0284c7;
        }

        .wait-item-type.walk {
            background: #fef3c7;
            color: #d97706;
        }

        .sidebar-empty {
            color: #94a3b8;
            font-size: 13px;
            padding: 20px 0;
            text-align: center;
        }

        /* Bottom control */
        .manage-link {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            opacity: 0.5;
        }

        .manage-link:hover {
            opacity: 1;
            transform: rotate(45deg) scale(1.1);
            background: #ffffff;
            border-color: #0ea5e9;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.1);
        }

        @media screen and (max-width: 768px) {
            .container { padding: 15px; }
            .main-content { flex-direction: column; }
            .sidebar { flex-direction: row; }
            .sidebar-section { flex: 1; }
            .call-card { border-radius: 18px; padding: 20px 16px; }
            .logo-img { width: 160px; }
            .clock-time { font-size: 24px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <img src="logo-wide.png" alt="Swift Logo" class="logo-img">
            <div class="header-clock">
                <div class="clock-time" id="clock">00:00:00</div>
                <div class="clock-date" id="dateDisplay"></div>
            </div>
        </header>

        <div class="main-content">
            <!-- Main Screen (3/4): Up to 4 call cards -->
            <div class="main-screen grid-1" id="mainScreen">
                <!-- Dynamically rendered -->
            </div>

            <!-- Sidebar (1/4): Reservation + Walk-in -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title reservation">
                        📋 Reservation <span class="count" id="resCount">0</span>
                    </div>
                    <div class="sidebar-list" id="reservationList"></div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-title walkin">
                        🚶 Walk-in <span class="count" id="walkCount">0</span>
                    </div>
                    <div class="sidebar-list" id="walkinList"></div>
                </div>
            </div>
        </div>
    </div>

    <a href="manage.html" class="manage-link" title="Manage Settings">⚙️</a>

    <div id="soundOverlay"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: white;">
        <div style="font-size: 60px; margin-bottom: 20px;">🔔</div>
        <div style="font-size: 24px; font-weight: 700;">Click to Enable Sound Alerts</div>
        <div style="font-size: 14px; margin-top: 10px; opacity: 0.8;">Required for browser audio playback</div>
    </div>

    <script>
        let lastVersion = -1;
        let audioCtx = null;
        let eventSource = null;
        let lastScreenIds = '';
        let scrollIntervals = {};

        const API_BASE = "https://swift-medical-api.naranja.my";

        // ── Sound ──
        document.getElementById('soundOverlay').addEventListener('click', function () {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            this.style.display = 'none';
            const buffer = audioCtx.createBuffer(1, 1, 22050);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start(0);
            playDing();
        });

        function playDing() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            function playNote(freq, startTime, duration) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + duration);
            }
            playNote(783.99, now, 0.8);
            playNote(1046.50, now + 0.15, 1.0);
        }

        // ── Clock ──
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const now2 = now;
            document.getElementById('dateDisplay').textContent =
                `${months[now2.getMonth()]} ${now2.getDate()}, ${now2.getFullYear()} (${days[now2.getDay()]})`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // ── Utilities ──
        function formatName(first, last) {
            if (!first || !last) return '—';
            const f = first.charAt(0).toUpperCase() + first.slice(1);
            const l = last.charAt(0).toUpperCase();
            return `${f} ${l}.`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getRoomColor(room) {
            if (!room) return '#64748b';
            const r = room.toLowerCase();
            if (r.includes('clinic 1')) return '#0ea5e9';
            if (r.includes('clinic 2')) return '#8b5cf6';
            if (r.includes('vital')) return '#f43f5e';
            return '#64748b';
        }

        // ── Auto Scroll ──
        function startAutoScroll(listId) {
            const list = document.getElementById(listId);
            if (!list) return;
            if (scrollIntervals[listId]) {
                clearInterval(scrollIntervals[listId]);
                scrollIntervals[listId] = null;
            }
            const items = list.children;
            if (items.length < 5) return;

            scrollIntervals[listId] = setInterval(() => {
                const maxScroll = list.scrollHeight - list.clientHeight;
                if (maxScroll <= 0) return;
                if (list.scrollTop >= maxScroll - 5) {
                    list.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    list.scrollBy({ top: 60, behavior: 'smooth' });
                }
            }, 2500);
        }

        // ── Render ──
        function renderScreenData(data) {
            const mainScreen = document.getElementById('mainScreen');
            const screenList = data.screen_list || [];
            const reservationList = data.waiting_reservation || [];
            const walkinList = data.waiting_walkin || [];
            const defaultMessage = data.default_message || "Welcome to Swift Medical Clinic";

            // Check if screen list changed for ding
            const newScreenIds = screenList.map(p => p.id).join(',');
            if (newScreenIds !== lastScreenIds && lastScreenIds !== '' && screenList.length > 0) {
                playDing();
            }
            lastScreenIds = newScreenIds;

            // ── Main Screen (max 4) ──
            const displayItems = screenList.slice(0, 4);
            const count = displayItems.length;

            // Set grid class
            mainScreen.className = 'main-screen';
            if (count === 0) {
                mainScreen.classList.add('grid-1');
            } else if (count === 1) {
                mainScreen.classList.add('grid-1');
            } else if (count === 2) {
                mainScreen.classList.add('grid-2');
            } else {
                mainScreen.classList.add('grid-4');
            }

            if (count === 0) {
                mainScreen.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🏥</div>
                        <div class="empty-text">${escapeHtml(defaultMessage)}</div>
                    </div>
                `;
            } else {
                mainScreen.innerHTML = '';
                displayItems.forEach((patient, idx) => {
                    const card = document.createElement('div');
                    card.className = 'call-card';
                    card.innerHTML = `
                        <div class="status-badge">
                            <div class="status-dot"></div>
                            Now Calling
                        </div>
                        <div class="patient-name">${formatName(patient.firstName, patient.lastName)}</div>
                        <div class="patient-note">${patient.externalNote ? escapeHtml(patient.externalNote) : ''}</div>
                        <div class="patient-room" style="background-color: ${getRoomColor(patient.room)}">${escapeHtml(patient.room || '')}</div>
                    `;
                    mainScreen.appendChild(card);
                });
            }

            // ── Sidebar: Reservation ──
            const resListEl = document.getElementById('reservationList');
            document.getElementById('resCount').textContent = reservationList.length;
            if (reservationList.length === 0) {
                resListEl.innerHTML = '<div class="sidebar-empty">No reservations</div>';
            } else {
                resListEl.innerHTML = '';
                reservationList.forEach(p => {
                    const item = document.createElement('div');
                    item.className = 'wait-item';
                    item.innerHTML = `
                        <div class="wait-item-name">${formatName(p.firstName, p.lastName)}</div>
                    `;
                    resListEl.appendChild(item);
                });
            }

            // ── Sidebar: Walk-in ──
            const walkListEl = document.getElementById('walkinList');
            document.getElementById('walkCount').textContent = walkinList.length;
            if (walkinList.length === 0) {
                walkListEl.innerHTML = '<div class="sidebar-empty">No walk-ins</div>';
            } else {
                walkListEl.innerHTML = '';
                walkinList.forEach(p => {
                    const item = document.createElement('div');
                    item.className = 'wait-item';
                    item.innerHTML = `
                        <div class="wait-item-name">${formatName(p.firstName, p.lastName)}</div>
                    `;
                    walkListEl.appendChild(item);
                });
            }

            // Auto scroll
            setTimeout(() => {
                startAutoScroll('reservationList');
                startAutoScroll('walkinList');
            }, 500);
        }

        // ── State Hash ──
        let lastStateHash = '';
        
        function getRelevantState(data) {
            // 스크린에 표시되는 필수 데이터만 추출 (이 데이터가 바뀔 때만 화면 갱신)
            const simplifyPatient = p => ({
                id: p.id,
                first: p.firstName,
                last: p.lastName,
                ext: p.externalNote,
                room: p.room
            });
            return JSON.stringify({
                screen: (data.screen_list || []).map(simplifyPatient),
                res: (data.waiting_reservation || []).map(simplifyPatient),
                walk: (data.waiting_walkin || []).map(simplifyPatient),
                msg: data.default_message
            });
        }

        // ── SSE ──
        function connectSSE() {
            if (eventSource) eventSource.close();
            console.log("[SSE] Connecting...");
            eventSource = new EventSource(`${API_BASE}/screen-events`);

            eventSource.onmessage = function (event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.version !== lastVersion) {
                        lastVersion = data.version;
                        
                        const newStateHash = getRelevantState(data);
                        if (newStateHash !== lastStateHash) {
                            console.log("[SSE] Relevant state changed, rendering...");
                            lastStateHash = newStateHash;
                            renderScreenData(data);
                        } else {
                            console.log("[SSE] Version bumped, but no relevant screen changes.");
                        }
                    }
                } catch (err) {
                    console.error("[SSE] Parse error:", err);
                }
            };

            eventSource.onerror = function () {
                console.warn("[SSE] Connection lost, reconnecting...");
                eventSource.close();
                setTimeout(connectSSE, 3000);
            };

            eventSource.onopen = function () {
                console.log("[SSE] Connected ✓");
            };
        }

        async function initialFetch() {
            try {
                const response = await fetch(`${API_BASE}/screen-data`);
                if (response.ok) {
                    const data = await response.json();
                    lastVersion = data.version;
                    lastStateHash = getRelevantState(data);
                    renderScreenData(data);
                }
            } catch (err) {
                console.error("Initial fetch failed:", err);
            }
        }

        initialFetch();
        connectSSE();
    </script>
</body>

</html>
